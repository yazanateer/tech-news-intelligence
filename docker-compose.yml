version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: israeli-tech-news-postgres
    environment:
      POSTGRES_DB: israeli_tech_news
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: israeli-tech-news-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: